# Compose de DESARROLLO autónomo (hot reload). Levanta TODO por sí solo:
#   docker compose -f docker-compose.dev.yml up --build
#
# Diferencia vs docker-compose.yml (producción): backend con `dotnet watch` y
# frontend con `next dev` (Turbopack), montando el código por bind-mount para
# reflejar cambios en segundos. Comparte el mismo proyecto/volumen que producción
# (name: products-system), así que NO se ejecutan ambos modos a la vez.

name: products-system

services:
  db:
    image: postgres:16-alpine
    container_name: products-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: products
      POSTGRES_PASSWORD: products_dev_pwd
      POSTGRES_DB: productsdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - products-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U products -d productsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev # imagen con dotnet watch
    container_name: products-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=productsdb;Username=products;Password=products_dev_pwd"
      Jwt__Secret: "dev_super_secret_change_in_production_0123456789_abcdef"
      Jwt__Issuer: "products-api"
      Jwt__Audience: "products-web"
      Jwt__ExpiryMinutes: "60"
      Cors__AllowedOrigins: "http://localhost:3000"
      DOTNET_USE_POLLING_FILE_WATCHER: "true" # watch fiable a través del bind-mount (macOS)
    ports:
      - "5080:8080"
    volumes:
      - ./backend:/src # código en vivo
      - backend_obj:/src/src/ProductsSystem.Api/obj # artefactos del contenedor, no del host
      - backend_bin:/src/src/ProductsSystem.Api/bin
    networks:
      - products-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s # dotnet watch compila en el primer arranque

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev # imagen con next dev
    container_name: products-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started # en dev no esperamos al healthcheck
    environment:
      NODE_ENV: development
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: ""
      INTERNAL_API_URL: "http://backend:8080" # las Route Handlers reenvían aquí
      WATCHPACK_POLLING: "true" # HMR fiable a través del bind-mount (macOS)
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app # código en vivo
      - frontend_node_modules:/app/node_modules # node_modules del contenedor, no del host macOS
      - frontend_next:/app/.next # caché de build aislada
    networks:
      - products-net

volumes:
  db_data:
  backend_obj:
  backend_bin:
  frontend_node_modules:
  frontend_next:

networks:
  products-net:
    driver: bridge
